<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <h1 class="logo">🔗 ShortURL</h1>
   <a href="dash.html" class="nav-link">Analytics Dashboard</a>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Shorten Your URL</h2>
      <p class="subtitle">Paste a long URL and get a short one instantly</p>

      <div class="input-group">
        <input
          type="text"
          id="urlInput"
          placeholder="Paste your long URL here..."
        />
        <button onclick="shortenUrl()">Shorten</button>
      </div>

      <div id="result" class="result hidden">
        <p>Your short URL:</p>
        <div class="short-url-box">
          <a id="shortLink" href="" target="_blank"></a>
          <button onclick="copyUrl()">Copy</button>
        </div>
        <a id="analyticsLink" href="" class="analytics-btn">View Analytics</a>
      </div>

      <div id="error" class="error hidden"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
